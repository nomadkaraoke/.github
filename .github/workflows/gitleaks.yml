name: Gitleaks

on:
  workflow_call:

jobs:
  scan:
    name: Scan for secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -eu
          VERSION=8.30.1
          curl -sSfL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Determine scan range
        id: range
        run: |
          set -eu
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "range=${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            echo "range=${{ github.event.before }}..${{ github.event.after }}" >> "$GITHUB_OUTPUT"
          else
            # First push to a branch, or tag push — scan only the head commit.
            echo "range=${{ github.event.after }}^..${{ github.event.after }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Scan commits in range
        run: |
          set -eu
          echo "Scanning range: ${{ steps.range.outputs.range }}"
          gitleaks git \
            --log-opts="${{ steps.range.outputs.range }}" \
            --redact \
            --verbose \
            --exit-code 1 \
            .
