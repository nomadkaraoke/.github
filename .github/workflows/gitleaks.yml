name: Gitleaks

on:
  workflow_call:
    inputs:
      fetch-depth:
        description: "Depth of git history to scan. 0 = full history (recommended for PRs)."
        type: number
        default: 0
        required: false

jobs:
  scan:
    name: Scan for secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: ${{ inputs.fetch-depth }}

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
